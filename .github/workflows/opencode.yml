name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [labeled]

concurrency:
  group: opencode-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # When an issue is labeled with "auto-implement", post a comment to
  # trigger the main opencode job (which requires issue_comment events).
  trigger-auto-implement:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'auto-implement'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '/oc implement this issue and create a PR'
            })

  opencode:
    if: |
      (
        github.actor != 'opencode-agent[bot]' &&
        github.actor != 'coderabbitai[bot]' &&
        github.event.pull_request.user.type != 'Bot' &&
        (
          (
            (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
            (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))
          ) ||
          (
            github.event_name == 'pull_request_review' &&
            (contains(github.event.review.body, '/oc') || contains(github.event.review.body, '/opencode'))
          )
        )
      ) || (
        github.event_name == 'issue_comment' &&
        github.actor == 'github-actions[bot]' &&
        contains(github.event.comment.body, '/oc implement this issue')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "opencode-agent[bot]"
          git config --global user.email "223556219+opencode-agent[bot]@users.noreply.github.com"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: ns-deepseek/deepseek-v4-pro
          use_github_token: true
