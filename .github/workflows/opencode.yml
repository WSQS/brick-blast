name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: opencode-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.user.type != 'Bot' &&
      (
        (
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          (contains(github.event.review.body, '/oc') || contains(github.event.review.body, '/opencode'))
        )
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "opencode-agent[bot]"
          git config --global user.email "223556219+opencode-agent[bot]@users.noreply.github.com"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_CONFIG: .opencode/ci/opencode.json
        with:
          model: ns-deepseek/deepseek-v4-pro
          use_github_token: true
