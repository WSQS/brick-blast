name: opencode-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: opencode-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-pr-metadata:
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update PR title and body with opencode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_CONFIG: .opencode/ci/opencode.json
        with:
          model: ns-deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            You are maintaining the metadata of this pull request for a Godot 4.7
            brick-breaker game written in GDScript.

            PR number: #${{ github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            PR URL: ${{ github.event.pull_request.html_url }}

            Task:
            1. Inspect the PR title, body, commits, and diff.
            2. Rewrite the PR title as a concise summary of the overall change.
               If the PR is a single focused change, use Angular commit format:
               `type(scope): lowercase subject`
               - type: feat | fix | refactor | test | docs | chore | style
               - scope: ball | brick | paddle | upgrade | menu | physics | test
               If the PR spans multiple areas, use a plain descriptive title instead.
               Keep under 72 characters. Do not add a trailing period.
            3. Append an AI-generated section to the PR body in English.
               Do NOT overwrite or remove existing body content — preserve it
               as-is and append below a `---` separator. If an existing
               `<!-- opencode-generated -->` block is present, replace only
               that block. Use this structure inside the block:

               <!-- opencode-generated -->
               ## Summary
               - Briefly explain what changed and why.

               ## Changes
               - Group by feature/area, list the main implementation changes.

               ## Testing
               - If GUT unit tests exist in the diff, mention test count and coverage.
               - Otherwise say "Not run".

               ## Notes for Reviewers
               - Highlight risk areas, edge cases, or breaking changes.
               - If none, omit this section.
               <!-- /opencode-generated -->

            Rules:
            - Base title and body strictly on the diff and commit messages.
              Do not fabricate features or tests that don't exist.
            - Do not modify source code.
            - Do not create commits.
            - Do not open a new PR.
            - Do not post a normal review comment unless updating the title/body fails.
            - Actually update the current PR title and body using the GitHub API or gh CLI.
            - Preserve important information from the existing PR body.

  review:
    needs: update-pr-metadata
    # NOTE: This if condition is intentionally duplicated from the update-pr-metadata job.
    # Keep both in sync when adding/removing bot exclusions.
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Review PR with opencode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_CONFIG: .opencode/ci/opencode.json
        with:
          model: ns-deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            You are reviewing a pull request for a Godot 4.7 brick-breaker game
            written in GDScript. The project uses GUT for testing, follows Angular
            commit conventions, and targets Windows + Android + Web.

            PR number: #${{ github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            PR URL: ${{ github.event.pull_request.html_url }}

            ## Step 1: Gather Context
            - Read the PR title, body, commits, and diff.
            - Read the changed files to understand the full context.

            ## Step 2: Post Inline Review Comments
            For each issue found, post an inline review comment on the specific
            code line. Each comment must include:

            - **Severity tag**: [Critical], [Major], [Minor], or [Nitpick]
            - **Category tag**: one of Functional Correctness, Stability,
              Maintainability, Performance, Code Style, Security
            - **Description**: concise explanation of the issue
            - **Proposed fix** (when applicable): a diff block

            Format:
            ````
            <severity> | <category>

            <description>

            **Suggested fix:**

            ```diff
            - old code
            + new code
            ```
            ````

            Guidelines:
            - Only comment on actionable issues. Skip trivial praise.
            - Prefer fewer high-quality comments over many low-value ones.
            - Focus on: Godot-specific gotchas (groups on instantiate,
              queue_free being deferred, CanvasLayer.visible, type inference),
              GDScript best practices, test coverage gaps, potential bugs.

            ## Step 3: Post Summary Comment
            After all inline comments, post a single summary PR comment with:

            1. **Walkthrough**: a table grouping changes by area

            | Area | Files | Summary |
            |------|-------|---------|
            | ... | ... | ... |

            2. **Pre-merge checks**:

            - [ ] Title follows convention (`type(scope): subject`)
            - [ ] Description is adequate
            - [ ] No secrets or sensitive data
            - [ ] CI is passing

            3. **Overall assessment**: REQUEST_CHANGES or APPROVE with rationale.

            Rules:
            - Do not modify source code.
            - Do not create commits.
            - Do not open a new PR.
            - Use the GitHub API to post real review comments on the PR.
            - All comments must be in English.
