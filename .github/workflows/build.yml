name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  export_game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > brick-blast.keystore
          echo "=== Keystore file check ==="
          ls -la brick-blast.keystore

      - name: Inject Android signing passwords
        run: |
          sed -i 's|password/keystore_release=""|password/keystore_release="${{ secrets.ANDROID_KEYSTORE_PASS }}"|' export_presets.cfg
          sed -i 's|password/key_release=""|password/key_release="${{ secrets.ANDROID_KEY_PASS }}"|' export_presets.cfg
          echo "=== Verifying export_presets.cfg ==="
          grep "password/" export_presets.cfg

      - name: Export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=export_templates.tpz&version=4.7
          relative_project_path: ./
          export_debug: false
          archive_output: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brick-blast-build-${{ github.run_number }}
          path: ${{ steps.export.outputs.archive_directory }}/*

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.export.outputs.archive_directory }}/*
          draft: true
          generate_release_notes: true
