name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  export_game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Android keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > brick-blast.keystore

      - name: Export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=export_templates.tpz&version=4.7
          relative_project_path: ./
          export_debug: false
          archive_output: true
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ github.workspace }}/brick-blast.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: brick-blast
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brick-blast-build-${{ github.run_number }}
          path: ${{ steps.export.outputs.archive_directory }}/*

      - name: Extract APK from zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ${{ steps.export.outputs.archive_directory }}
          for f in *Android*.zip; do
            unzip -o "$f" -d .
          done
          mkdir -p release
          cp *.zip release/ 2>/dev/null || true
          cp *.apk release/ 2>/dev/null || true
          # Remove redundant Android zip; APK is already included
          rm -f release/*Android*.zip
          ls -la release/

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.export.outputs.archive_directory }}/release/*
          draft: true
          generate_release_notes: true


